<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO — Реєстрація</title>
    <!-- Підключення Supabase через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; padding: 0; background: #000; font-family: Arial, sans-serif; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #111; padding: 40px; width: 350px; border-radius: 15px; box-shadow: 0 0 20px rgba(255,255,255,0.1); text-align: center; }
        .logo { font-size: 48px; font-weight: bold; margin-bottom: 25px; }
        h3 { margin-bottom: 20px; font-weight: normal; color: #ccc; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; border-radius: 25px; border: none; background: #222; color: #fff; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn { padding: 12px; margin-top: 15px; border: none; color: #fff; font-size: 16px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        #nextBtn { background: #1d9bf0; width: 100%; }
        #prevBtn { background: #333; width: 48%; display: none; }
        .buttons { display: flex; justify-content: space-between; gap: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">BO</div>

    <form id="regForm">
        <!-- Крок 1 -->
        <div class="tab">
            <h3>Контакти</h3>
            <input type="email" id="email" class="input-field" placeholder="E-mail" required>
            <input type="password" id="password" class="input-field" placeholder="Пароль" required>
        </div>

        <!-- Крок 2 -->
        <div class="tab" style="display:none;">
            <h3>Про себе</h3>
            <input type="text" id="firstName" class="input-field" placeholder="Ім'я">
            <input type="text" id="lastName" class="input-field" placeholder="Прізвище">
        </div>

        <div class="buttons">
            <button type="button" id="prevBtn" class="btn" onclick="nextPrev(-1)">Назад</button>
            <button type="button" id="nextBtn" class="btn" onclick="nextPrev(1)">Далі</button>
        </div>
    </form>
</div>

<script>
   // ВАЖЛИВО: Ці дані мають бути ПРАВИЛЬНИМИ
const SUPABASE_URL = 'https://kzfmlkskcovenuoftorm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6Zm1sa3NrY292ZW51b2Z0b3JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjU0MTMsImV4cCI6MjA4ODQ0MTQxM30.o1N2biSorW85m_mlpAxndmWlLi0d_49WqBLtjxTNGKk';

// Пряма ініціалізація без очікування DOM
const _supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

if (!_supabase) {
    console.error("Критична помилка: Бібліотека Supabase не завантажена!");
}

let currentTab = 0;

function nextPrev(n) {
    const tabs = document.getElementsByClassName("tab");
    
    // Валідація полів
    const inputs = tabs[currentTab].querySelectorAll("input");
    if (n === 1) {
        let valid = true;
        inputs.forEach(input => {
            if (!input.checkValidity()) {
                input.reportValidity();
                valid = false;
            }
        });
        if (!valid) return false;
    }

    // Якщо останній крок
    if (n === 1 && currentTab === tabs.length - 1) {
        handleSignUp();
        return false;
    }

    // Перемикання вкладок
    tabs[currentTab].style.display = "none";
    currentTab += n;
    tabs[currentTab].style.display = "block";

    // Кнопки
    document.getElementById("prevBtn").style.display = currentTab === 0 ? "none" : "inline-block";
    const nextBtn = document.getElementById("nextBtn");
    nextBtn.innerHTML = currentTab === tabs.length - 1 ? "Готово" : "Далі";
    nextBtn.style.width = currentTab === 0 ? "100%" : "48%";
}

async function handleSignUp() {
    if (!_supabase) {
        alert("Помилка: Спробуйте оновити сторінку, база даних не підключена.");
        return;
    }

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;

    const nextBtn = document.getElementById("nextBtn");
    const originalText = nextBtn.innerText;
    nextBtn.innerText = "Обробка...";
    nextBtn.disabled = true;

    try {
        const { data, error } = await _supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { first_name: firstName, last_name: lastName }
            }
        });

        if (error) throw error;

        alert('Лист для підтвердження надіслано на вашу пошту!');
        location.reload();
    } catch (err) {
        alert('Помилка реєстрації: ' + err.message);
        nextBtn.innerText = originalText;
        nextBtn.disabled = false;
    }
}


</script>
</body>
</html>
