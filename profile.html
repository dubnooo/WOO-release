<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO — Профіль</title>
    <!-- Підключення Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #000; color: #fff; }
        .sidebar { position: fixed; top: 0; left: 0; width: 250px; height: 100%; border-right: 5px solid #2f3336; padding: 0px; box-sizing: border-box; }
        .logo { font-size: 40px; font-weight: bold; margin-bottom: 30px; }
        .menu-item { display: block; padding: 12px 0; font-size: 20px; color: white; text-decoration: none; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { color: #1d9bf0; }
        .main { margin-left: 250px; min-height: 100vh; }
        .header { position: sticky; top: 0; background: #000; padding: 15px; font-size: 22px; font-weight: bold; border-bottom: 5px solid #2f3336; }
        .profile-container { padding: 30px; max-width: 700px; }
        .profile-cover { height: 150px; background: #1d9bf0; border-radius: 15px; }
        .profile-avatar { margin-top: -50px; }
        .profile-avatar img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid black; object-fit: cover; background: #222; }
        .profile-info { margin-top: 15px; }
        .edit-btn { background: #1d9bf0; border: none; padding: 10px 18px; border-radius: 25px; color: white; cursor: pointer; margin-top: 15px; }
        .edit-btn:hover { background: #1a8cd8; }
        .settings-panel { display: none; background: #111; border: 1px solid #2f3336; border-radius: 15px; padding: 20px; margin-top: 20px; }
        .settings-panel input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 25px; border: 1px solid #333; background: #000; color: white; outline: none; box-sizing: border-box; }
        .logout-btn { color: #ff4444; cursor: pointer; margin-top: 20px; display: block; text-decoration: none; font-size: 14px; }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">BO</div>
    <a href="page.html" class="menu-item active">Головна</a>
    <a href="search.html" class="menu-item">Пошук</a>
    <a href="notifications.html" class="menu-item">Сповіщення</a>
    <a href="messages.html" class="menu-item">Повідомлення</a>
    <a href="profile.html" class="menu-item">Профіль</a>
    <a href="settings.html" class="menu-item">Налаштування</a>
    <a href="gamehub.html" class="menu-item">Геймерський Хаб</a>
    <a href="musilk.html" class="menu-item active">WOtify</a>
</div>

<div class="main">
    <div class="header">Профіль</div>
    <div class="profile-container">
        <div class="profile-cover"></div>
        <div class="profile-avatar">
            <img id="avatar" src="https://via.placeholder.com">
        </div>

        <div class="profile-info">
            <h2 id="name">Завантаження...</h2>
            <p id="username">@user</p>
            <p id="bio">Опис профілю</p>
        </div>

        <button class="edit-btn" onclick="toggleSettings()">Редагувати профіль</button>

        <div class="settings-panel" id="settingsPanel">
            <h3>Редагування профілю</h3>
            <input type="text" id="nameInput" placeholder="Ім'я та Прізвище">
            <input type="text" id="usernameInput" placeholder="Username (без @)">
            <input type="text" id="bioInput" placeholder="Про себе">
            
            <label style="display:block; margin: 10px 0 5px 10px; color: #888; font-size: 14px;">Змінити фото:</label>
            <input type="file" id="avatarInput" accept="image/*">
            
            <button class="edit-btn" id="saveBtn" onclick="saveProfile()">Зберегти в хмару</button>
        </div>
    </div>
</div>

<script>
    // 1. КОНФІГУРАЦІЯ
    const SUPABASE_URL = 'https://kzfmlkskcovenuoftorm.supabase.co'.trim();
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6Zm1sa3NrY292ZW51b2Z0b3JtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NjU0MTMsImV4cCI6MjA4ODQ0MTQxM30.o1N2biSorW85m_mlpAxndmWlLi0d_49WqBLtjxTNGKk'.trim();
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. ЗАВАНТАЖЕННЯ ПРОФІЛЮ
    async function loadProfile() {
        const { data: { user }, error } = await _supabase.auth.getUser();

        if (error || !user) {
            window.location.href = "login.html";
            return;
        }

        const metadata = user.user_metadata || {};
        
        // Відображення даних
        document.getElementById("name").innerText = metadata.first_name || "Користувач";
        document.getElementById("username").innerText = "@" + (metadata.username || "user");
        document.getElementById("bio").innerText = metadata.bio || "Опис профілю";
        
        if (metadata.avatar_url) {
            document.getElementById("avatar").src = metadata.avatar_url;
        }

        // Заповнення полів редагування
        document.getElementById("nameInput").value = metadata.first_name || "";
        document.getElementById("usernameInput").value = metadata.username || "";
        document.getElementById("bioInput").value = metadata.bio || "";
    }

    // 3. ЗБЕРЕЖЕННЯ (ФОТО + ТЕКСТ)
    async function saveProfile() {
        const saveBtn = document.getElementById("saveBtn");
        const nameInput = document.getElementById("nameInput").value;
        const usernameInput = document.getElementById("usernameInput").value;
        const bioInput = document.getElementById("bioInput").value;
        const avatarFile = document.getElementById("avatarInput").files[0];

        saveBtn.innerText = "Збереження...";
        saveBtn.disabled = true;

        let finalAvatarUrl = document.getElementById("avatar").src;

        try {
            const { data: { user } } = await _supabase.auth.getUser();

            // Якщо вибрано файл - завантажуємо в Storage
            if (avatarFile) {
                const fileExt = avatarFile.name.split('.').pop();
                const filePath = `${user.id}/${Math.random()}.${fileExt}`;

                const { error: uploadError } = await _supabase.storage
                    .from('avatars')
                    .upload(filePath, avatarFile);

                if (uploadError) throw uploadError;

                const { data } = _supabase.storage.from('avatars').getPublicUrl(filePath);
                finalAvatarUrl = data.publicUrl;
            }

            // Оновлюємо метадані користувача
            const { error: updateError } = await _supabase.auth.updateUser({
                data: { 
                    first_name: nameInput, 
                    username: usernameInput,
                    bio: bioInput,
                    avatar_url: finalAvatarUrl
                }
            });

            if (updateError) throw updateError;

            alert("Профіль успішно оновлено!");
            loadProfile();
            toggleSettings();

        } catch (err) {
            alert("Помилка: " + err.message);
        } finally {
            saveBtn.innerText = "Зберегти в хмару";
            saveBtn.disabled = false;
        }
    }

    async function handleLogout() {
        await _supabase.auth.signOut();
        window.location.href = "login.html";
    }

    function toggleSettings() {
        const panel = document.getElementById("settingsPanel");
        panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    window.onload = loadProfile;
</script>

</body>
</html>
