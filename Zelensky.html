<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BO — Повідомлення</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    font-family: Arial;
}

.chat-header{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    margin-bottom:10px;
}

.chat-header img{
    width:40px;
    height:40px;
    border-radius:50%;
}

.chat-box{
    background:#222;
    padding:10px;
    border-radius:10px;
    height:400px;
    overflow-y:auto;
}

.message{
    padding:10px;
    margin:8px;
    border-radius:10px;
    max-width:60%;
}

.user{
    background:#6d3939;
    margin-left:auto;
    text-align:right;
}

.bot{
    background:#444;
}

.input-box{
    display:flex;
    margin-top:10px;
}

.input-box input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:none;
}

.input-box button{
    margin-left:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#6d3939;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">BO</div>
<a href="page.html" class="menu-item">Головна</a>
<a href="search.html" class="menu-item">Пошук</a>
<a href="notifications.html" class="menu-item">Сповіщення</a>
<a href="messages.html" class="menu-item active">Повідомлення</a>
<a href="profile.html" class="menu-item">Профіль</a>
<a href="settings.html" class="menu-item">Налаштування</a>
<a href="gamehub.html" class="menu-item">Геймерський Хаб</a>
<a href="musilk.html" class="menu-item">WOtify</a>
</div>

<div class="main">

<div class="chat-header">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Volodymyr_Zelensky_Official_portrait.jpg">
Переписка з Zelensky_official
</div>

<div class="chat-box" id="chat"></div>

<div class="input-box">
<input type="text" id="messageInput" placeholder="Напишіть повідомлення...">
<button onclick="sendMessage()">Надіслати</button>
</div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("messageInput");
let text = input.value;

if(text.trim() === "") return;

let chat = document.getElementById("chat");

let userMessage = document.createElement("div");
userMessage.className = "message user";
userMessage.textContent = text;

chat.appendChild(userMessage);

input.value = "";

chat.scrollTop = chat.scrollHeight;

setTimeout(replyMessage,1000);

}

function replyMessage(){

let replies = [
"Дякую за повідомлення!",
"Разом ми сильніші 🇺🇦",
"Віримо в перемогу!",
"Підтримуйте одне одного.",
"Україна обов'язково переможе."
];

let random = replies[Math.floor(Math.random()*replies.length)];

let chat = document.getElementById("chat");

let botMessage = document.createElement("div");
botMessage.className = "message bot";
botMessage.textContent = random;

chat.appendChild(botMessage);

chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
