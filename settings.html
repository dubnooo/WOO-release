<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO — Налаштування</title>

    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #000;
        color: #fff;
    }
    
    .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 250px;
        height: 100%;
        border-right: 5px solid #2f3336;
        padding: 0px;
    }
    
    .logo {
        font-size: 40px;
        font-weight: bold;
        margin-bottom: 30px;
    }
    
    .menu-item {
        display: block;
        padding: 12px 0;
        font-size: 20px;
        color: white;
        text-decoration: none;
    }
    
    .menu-item:hover,
    .menu-item.active {
        color: #1d9bf0;
    }
    
    .main {
        margin-left: 250px;
        height: 100vh;
        overflow-y: auto;
    }
    
    .header {
        position: sticky;
        top: 0;
        background: #000;
        padding: 15px;
        font-size: 22px;
        font-weight: bold;
        border-bottom: 5px solid #2f3336;
    }

    /* ===== НАЛАШТУВАННЯ ===== */

    .settings-container {
        padding: 30px;
        max-width: 700px;
    }

    .setting-card {
        background: #111;
        border: 1px solid #2f3336;
        border-radius: 15px;
        padding: 20px;
        margin-bottom: 20px;
    }

    .setting-card h3 {
        margin-bottom: 10px;
    }

    .setting-card input {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #333;
        background: #000;
        color: white;
        font-size: 16px;
        outline: none;
    }

    .save-btn {
        background: #1d9bf0;
        border: none;
        padding: 10px 18px;
        border-radius: 25px;
        font-size: 16px;
        color: #fff;
        cursor: pointer;
        margin-top: 15px;
    }

    .save-btn:hover {
        background: #1a8cd8;
    }

    .logout-btn {
    background: #ff4d4d;
    border: none;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 16px;
    color: #fff;
    cursor: pointer;
    margin-top: 10px;
}

.logout-btn:hover {
    background: #e63939;
}

    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">BO</div>
    <a href="page.html" class="menu-item">Головна</a>
    <a href="search.html" class="menu-item">Пошук</a>
    <a href="notifications.html" class="menu-item">Сповіщення</a>
    <a href="messages.html" class="menu-item">Повідомлення</a>
    <a href="profile.html" class="menu-item">Профіль</a>
    <a href="settings.html" class="menu-item active">Налаштування</a>
    <a href="gamehub.html" class="menu-item">Геймерський Хаб</a>
    <a href="musilk.html" class="menu-item active">WOtify</a>
</div>

<div class="main">
    <div class="header">Налаштування</div>

    <div class="settings-container">

        <div class="setting-card">
            <h3>Змінити ім’я</h3>
            <input type="text" placeholder="Нове ім'я">
            <button class="save-btn">Зберегти</button>
        </div>

        <div class="setting-card">
            <h3>Змінити Email</h3>
            <input type="email" placeholder="example@email.com">
            <button class="save-btn">Оновити</button>
        </div>

        <div class="setting-card">
            <h3>Змінити пароль</h3>
            <input type="password" placeholder="Новий пароль">
            <button class="save-btn">Змінити</button>
        </div>
        <div class="setting-card">
    <h3 style="color:#ff4d4d;">Вийти з акаунта</h3>
    <button class="logout-btn" onclick="logout()">Вийти</button>
</div>
    </div>
</div>

</body>
<script>
function logout() {
    localStorage.clear(); // очищає всі збережені дані
    alert("Ви вийшли з акаунта");
    window.location.href = "login.html"; // переадресація
}
</script>
</html>
